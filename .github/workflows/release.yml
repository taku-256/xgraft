name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - v*

jobs:
  build:
    runs-on: ${{ matrix.job.os }}

    strategy:
      fail-fast: false
      matrix:
        job:
          - { os: ubuntu-latest  , target: x86_64-unknown-linux-gnu       , use-cross: false , extension: ""   }
          - { os: ubuntu-latest  , target: x86_64-unknown-linux-musl      , use-cross: true  , extension: ""   }
          - { os: ubuntu-latest  , target: armv7-unknown-linux-gnueabihf  , use-cross: true  , extension: ""   }
          - { os: ubuntu-latest  , target: aarch64-unknown-linux-gnu      , use-cross: true  , extension: ""   }
          - { os: macos-latest   , target: x86_64-apple-darwin            , use-cross: false , extension: ""   }
          - { os: macos-latest   , target: aarch64-apple-darwin           , use-cross: false , extension: ""   }
          - { os: windows-latest , target: x86_64-pc-windows-msvc         , use-cross: false , extension: .exe }

    steps:
      - uses: actions/checkout@v4

      - name: Extract crate name
        shell: bash
        run: |
          echo "PROJECT_NAME=$(sed -n 's/^name = "\(.*\)"/\1/p' Cargo.toml | head -n1)" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Install cross
        if: matrix.job.use-cross
        shell: bash
        run: cargo install cross

      - name: Build (Unix / cross unified)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "${{ matrix.job.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.job.target }}
          else
            cargo build --release --target ${{ matrix.job.target }}
          fi

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="target/${{ matrix.job.target }}/release/${PROJECT_NAME}"
          mkdir -p dist
          cp "$BIN" dist/
          tar -czf "${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.job.target }}.tar.gz" -C dist .

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --release --target ${{ matrix.job.target }}

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.job.target }}/release/${{ env.PROJECT_NAME }}.exe"
          $out = "${{ env.PROJECT_NAME }}-${{ github.ref_name }}-${{ matrix.job.target }}.zip"
          New-Item -ItemType Directory dist -Force | Out-Null
          Copy-Item $bin dist/
          Compress-Archive -Path dist/* -DestinationPath $out -Force

      - name: Build installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $env:APP_VERSION = $version
          iscc installer/xgraft.iss

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          files: |
            *.tar.gz
            *.zip
            installer/output/*.exe

  trigger-brew:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Homebrew update
        shell: bash
        run: |
          echo "dispatch start"
          curl -X POST \
            -H "Authorization: token ${{ secrets.HOMEBREW_TAP_TOKEN }}" \
            -H "Accept: application/vnd.github.everest-preview+json" \
            https://api.github.com/repos/taku-256/homebrew-xgraft/dispatches \
            -d "{\"event_type\":\"update-brew\",\"client_payload\":{\"tag\":\"${{ github.ref_name }}\"}}"
          echo "dispatch end"